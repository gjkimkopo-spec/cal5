<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새로운 계산기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'맑은 고딕', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f5e8ff,#e8d8ff,#fdf1ff);
}

.calculator{
    width:430px;
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:25px;
    box-shadow:0 15px 40px rgba(150,100,200,0.3);
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#7a3db8;
    margin-bottom:20px;
    text-shadow:2px 2px 8px rgba(255,255,255,0.8);
}

.display{
    width:100%;
    height:70px;
    border:none;
    border-radius:15px;
    padding:15px;
    font-size:30px;
    text-align:right;
    background:#fff;
    color:#333;
    margin-bottom:15px;
}

.history{
    height:180px;
    overflow-y:auto;
    background:#fff;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
    color:#444;
    font-size:16px;
    line-height:1.8;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
    background:#e8ccff;
    color:#5a278d;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
    background:#dcb8ff;
}

.operator{
    background:#cda3ff;
}

.equal{
    background:#9f6dff;
    color:white;
}

.clear{
    background:#ff8fb3;
    color:white;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#7a3db8;
    font-size:20px;
    font-weight:bold;
}

.history-title{
    font-weight:bold;
    color:#7a3db8;
    margin-bottom:5px;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="title">💜 새로운 계산기 💜</div>

    <input type="text" id="display" class="display" readonly>

    <div class="history">
        <div class="history-title">📜 계산 과정</div>
        <div id="history"></div>
    </div>

    <div class="buttons">

        <button class="clear" onclick="clearAll()">C</button>
        <button onclick="backspace()">←</button>
        <button onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" style="grid-column: span 2;" onclick="calculate()">=</button>

    </div>

    <div class="footer">🌹 김 군 진 🌹</div>

</div>

<script>

const display = document.getElementById("display");
const historyDiv = document.getElementById("history");

const sounds = {
    "1":"일",
    "2":"이",
    "3":"삼",
    "4":"사",
    "5":"오",
    "6":"육",
    "7":"칠",
    "8":"팔",
    "9":"구",
    "0":"영",
    "+":"더하기",
    "-":"빼기",
    "*":"곱하기",
    "/":"나누기",
    "%":"퍼센트",
    "=":"계산완료",
    "C":"지웁니다",
    "←":"뒤로"
};

function speak(text){

    if(!window.speechSynthesis) return;

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang="ko-KR";
    msg.rate=1;
    msg.pitch=1.1;

    speechSynthesis.speak(msg);
}

function append(value){

    display.value += value;

    if(sounds[value]){
        speak(sounds[value]);
    }
}

function backspace(){

    display.value =
    display.value.slice(0,-1);

    speak("뒤로");
}

function clearAll(){

    display.value = "";
    historyDiv.innerHTML = "";

    speak("지웁니다");
}

function calculate(){

    try{

        speak("계산완료");

        const expression = display.value;

        const result = eval(expression);

        const line =
        expression + " = " + result;

        historyDiv.innerHTML +=
        "<div>"+line+"</div>";

        historyDiv.scrollTop =
        historyDiv.scrollHeight;

        display.value = result;

    }catch{

        display.value = "오류";
    }
}

</script>

</body>
</html>
